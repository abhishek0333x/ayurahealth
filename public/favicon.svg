<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Premium Deep Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05100a" />
      <stop offset="100%" stop-color="#0a1c12" />
    </linearGradient>

    <!-- Vibrant Biological Green for the Leaf Structure -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5a1b" />
      <stop offset="50%" stop-color="#4aa868" />
      <stop offset="100%" stop-color="#abf0c6" />
    </linearGradient>

    <!-- Golden Technological Gradient for AI Nodes -->
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2ead5" />
      <stop offset="60%" stop-color="#d4b459" />
      <stop offset="100%" stop-color="#8c732b" />
    </linearGradient>

    <!-- Rich Soft Glow for pure premium feel -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- iOS-style Squircle Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" stroke="#1a4d2e" stroke-width="3" />

  <g transform="translate(16, -16)">
    <!-- 1. The Organic Biomembrane (Outer Leaf Silhouette) -->
    <!-- Elegantly sweeping curved Neem Leaf frame -->
    <path d="M 160 420 
             C 70 260, 170 140, 380 100 
             C 320 220, 350 330, 160 420 Z" 
          fill="url(#leafGrad)" opacity="0.08" />
    
    <path d="M 160 420 
             C 70 260, 170 140, 380 100 
             C 320 220, 350 330, 160 420 Z" 
          stroke="url(#leafGrad)" stroke-width="5" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 2. The Bio-Digital Spine -->
    <path d="M 160 420 Q 220 240 380 100" stroke="url(#leafGrad)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)"/>

    <!-- 3. The Neural/AI Veins (Intersecting the biological spine) -->
    
    <!-- Node System 1 (Bottom Left) -->
    <path d="M 200 340 L 140 280 L 140 220" stroke="url(#techGrad)" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <circle cx="200" cy="340" r="5" fill="#fff" filter="url(#glow)" />
    <circle cx="140" cy="280" r="8" fill="url(#techGrad)" filter="url(#glow)"/>
    <circle cx="140" cy="220" r="4" fill="url(#techGrad)" />

    <!-- Node System 2 (Right Side) -->
    <path d="M 245 270 L 310 270 L 340 240 L 340 190" stroke="url(#techGrad)" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <circle cx="245" cy="270" r="6" fill="#fff" filter="url(#glow)" />
    <circle cx="310" cy="270" r="10" fill="url(#techGrad)" filter="url(#glow)"/>
    <circle cx="340" cy="240" r="6" fill="url(#techGrad)" />
    <circle cx="340" cy="190" r="4" fill="url(#techGrad)" />

    <!-- Node System 3 (Upper Left) -->
    <path d="M 290 205 L 240 155 L 200 155" stroke="url(#techGrad)" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <circle cx="290" cy="205" r="5" fill="#fff" filter="url(#glow)" />
    <circle cx="240" cy="155" r="9" fill="url(#techGrad)" filter="url(#glow)"/>
    <circle cx="200" cy="155" r="5" fill="url(#techGrad)" />

    <!-- Node System 4 (Top Right) -->
    <path d="M 335 155 L 390 155 L 420 125" stroke="url(#techGrad)" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <circle cx="335" cy="155" r="5" fill="#fff" filter="url(#glow)" />
    <circle cx="390" cy="155" r="7" fill="url(#techGrad)" filter="url(#glow)"/>
    <circle cx="420" cy="125" r="4" fill="url(#techGrad)" />
    
  </g>
</svg>
